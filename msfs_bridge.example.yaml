# Sky Watch – MSFS2024 bridge config (runs on the Windows gaming PC).
# Copy this to  msfs_bridge.yaml  and edit. Then:
#   pip install SimConnect requests PyYAML
#   python msfs_bridge.py --install-autostart   # starts automatically at logon
#   python msfs_bridge.py                        # or run it manually

msfs_bridge:
  # Where your Sky Watch server is on the LAN (note the /api/msfs_position path).
  server_url: "http://ip:port/api/msfs_position"

  # How often to read + send the position (seconds).
  poll_interval_seconds: 2

  # If your Sky Watch web UI is password-protected, put that password here so the
  # bridge is allowed to POST. Leave empty if you have no auth.
  api_token: ""

  # Discord STATUS (Rich Presence) – shows under your name like a game:
  #   "Playing Microsoft Flight Simulator 2024 — Flying a Cessna 172 · Vienna → …"
  # Works out of the box (an app id is baked into the bridge) – just run:
  #   pip install pypresence
  # and have the Discord desktop app running. Leave this empty to use the built-in
  # app, or paste your own Discord Application ID to show your own app name.
  discord_rpc_client_id: ""

  # (Optional, separate) post to a Discord CHANNEL via webhook instead/as well.
  # Usually you want the status above, not this. Leave empty to disable.
  discord_webhook: ""
  discord_name: "TreXito"
  discord_update_seconds: 60
