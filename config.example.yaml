# ──────────────────────────────────────────────────────────────
#  Sky Watch – configuration
#  Fill in your location below. Everything else is optional.
# ──────────────────────────────────────────────────────────────

# Your location (REQUIRED) – default is Linz, Austria.
latitude: 48.3064
longitude: 14.2858

# OpenSky API – free account at https://opensky-network.org
# Leave empty for anonymous access (slower polling, heavier rate limits).
opensky_username: ""
opensky_password: ""
# OpenSky migrated to OAuth2 API clients. If you created an API client,
# put its credentials here instead (takes priority over username/password):
# opensky_client_id: ""
# opensky_client_secret: ""

# Discord alerts – paste your webhook URL, leave empty to disable.
discord_webhook: ""

# Optional: your personal watchlist (alerts when these enter your radius).
# watchlist:
#   - icao24: "440b41"
#     label: "RotorSky R22 (OE-XIW)"
#   - icao24: "3c6444"
#     label: "Antonov An-124"

# ──────────────────────────────────────────────────────────────
#  Advanced options (all optional – see README "Advanced Configuration").
#  Uncomment and edit only if you need them.
# ──────────────────────────────────────────────────────────────
# port: 8080
# radius_km: 50         # alert area (Discord/notifications) around your location
# password: ""          # set to enable HTTP Basic auth on the web UI
# poll_interval: 10
# dark_mode: true
# public_url: "https://skywatch.example.com"
#
# How much traffic the MAP shows (alerts always use radius_km):
#   viewport = every aircraft in the current map view, worldwide (default)
#   radius   = only aircraft inside radius_km
#   global   = the whole world at once (heavy on OpenSky credits)
# tracking_mode: "viewport"
# max_aircraft: 800     # cap markers drawn (browser performance)
# routes_enabled: true  # show flight origin/destination (adsbdb.com)
#
# ⚠️ OpenSky bills CREDITS by query area (~4000/day on a free account). If you get
#    rate-limited, raise these intervals. The worldwide rare scan is much cheaper
#    than fast local polling, so it's the recommended way to find rare jets.
# poll_interval: 15            # local poll (s); auto = 15 (auth) / 25 (anonymous)
# global_scan_enabled: true    # one worldwide scan for rare/military/emergency jets
# global_scan_interval: 300    # seconds between worldwide scans
# region_poll_interval: 120    # seconds between region-watch polls
# daily_credit_budget: 4000    # free OpenSky account ~4000 credits/day; the app
#                              # maxes this out without exceeding it (scans get
#                              # priority, interactive fetches reserve ~15%)
#
# Map labels language / style: dark-en (English labels) | dark | german | light | satellite
# map_style: "dark-en"
#
# Discord extras
# discord_photos: true  # attach an aircraft photo to alert embeds
# discord_webhook_highlights: ""  # "coolest cases" channel (photo + deep link)
#
# 💡 Almost everything here can also be edited live in the web UI (🛠️ Settings) –
#    those changes are saved to data/settings_overrides.yaml and this file is left
#    untouched.
#
# Region-entry alerts – ping when ANY aircraft enters a region. Use a built-in
# gazetteer name (Ukraine, Israel, Gaza, Syria, Russia, …) or custom coordinates.
# watch_regions:
#   - name: "Ukraine"
#   - name: "My MOA"
#     lat: 48.7
#     lon: 15.4
#     radius_km: 60
#
# Local Ollama AI analysis (adds a short AI note to Discord alerts).
# Needs Ollama running locally and the model pulled (e.g. `ollama pull llama3.1`).
# ollama_enabled: false
# ollama_url: "http://localhost:11434"   # remote works too, e.g. http://server:11434
# ollama_model: "llama3.1"
# ollama_insights: true            # every minute: AI picks the most interesting jets
# ollama_insights_interval: 60     # seconds between AI passes
# ollama_digest_minutes: 0   # >0 = periodic AI situation summary to Discord
#
# Flight history / trails (FlightRadar24-like, for observed aircraft)
# flight_history_enabled: true
# trail_minutes: 180
#
# Map layers (all on by default): weather radar, airports + METAR, day/night,
# aircraft photos, conflict zones, statistics.
# weather_enabled: true
# airports_enabled: true
# airports_min_type: "medium"   # small | medium | large
# zones_enabled: true
#
# Conflict/hazard zones are built from news feeds + a built-in region gazetteer.
# Add your own news feeds (extends the defaults) …
# news_feeds:
#   - "https://example.com/rss"
# … or define static zones (e.g. a military operating area near you):
# conflict_zones:
#   - name: "Allentsteig MOA"
#     lat: 48.68
#     lon: 15.40
#     radius_km: 25
#     note: "Military training area"
